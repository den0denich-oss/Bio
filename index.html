<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dany.run.place</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --dark-bg: #060a14;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background floating dots */
        .bg-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-dot {
            position: absolute;
            width: 3px;
            height: 3px;            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatDot 20s infinite ease-in-out;
        }

        @keyframes floatDot {
            0%, 100% { transform: translate(0, 0); opacity: 0.3; }
            25% { transform: translate(20px, -20px); opacity: 0.5; }
            50% { transform: translate(-15px, 15px); opacity: 0.4; }
            75% { transform: translate(10px, -10px); opacity: 0.6; }
        }

        /* Header */
        header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
            padding: 12px 25px;
            background: rgba(59, 130, 246, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .logo:hover {
            transform: scale(1.05);
            background: rgba(59, 130, 246, 0.1);
        }

        .logo-blue {
            color: var(--accent);
        }
        .logo-white {
            color: var(--text-primary);
        }

        /* Nav with sliding indicator */
        nav {
            position: relative;
            display: flex;
            gap: 25px;
            align-items: center;
            padding: 12px 25px;
            background: rgba(59, 130, 246, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 50px;
            overflow: hidden;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            padding: 8px 18px;
            border-radius: 50px;
            position: relative;
            z-index: 2;
        }

        nav a.active {
            color: var(--accent);
            font-weight: 600;
        }

        nav a:hover {
            color: var(--accent);
        }

        nav a:active {
            transform: scale(0.95);
        }

        /* Sliding pill indicator */
        .nav-indicator {
            position: absolute;
            height: 38px;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.35);            border-radius: 50px;
            box-shadow: 0 0 15px var(--accent-glow);
            z-index: 1;
            transition: left 0.5s cubic-bezier(0.22, 1, 0.36, 1), width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            top: 10px;
            pointer-events: none;
            will-change: left, width;
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 150px 20px 100px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 30px;
            max-width: 900px;
        }

        .subtitle {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .highlight {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 6px;
            text-decoration-thickness: 2px;
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.6;
            margin-left: auto;
            margin-right: auto;        }

        /* Sections */
        section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 50px;
            text-align: center;
            color: var(--text-primary);
        }

        /* Publications Container */
        .publications-container {
            background: rgba(59, 130, 246, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.12);
            border-radius: 24px;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .publications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .publication-card {
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(30px);
        }
        .publication-card.animate {
            animation: slideUpFade 0.6s ease-out forwards;
        }

        .publication-card:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.25);
            transform: translateY(-3px);
        }

        .publication-card.hidden {
            display: none;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .pub-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .pub-excerpt {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.9rem;
            flex-grow: 1;
        }

        .pub-date {
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            opacity: 0.8;
        }

        .show-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.25);            border-radius: 50px;
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 auto;
        }

        .show-more-btn:hover {
            background: var(--accent);
            color: var(--dark-bg);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .show-more-btn:active {
            transform: scale(0.96);
        }

        /* Contact Container */
        .contact-container {
            background: rgba(59, 130, 246, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.12);
            border-radius: 24px;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .social-card {
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;            color: var(--text-primary);
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
        }

        .social-card.animate {
            animation: socialSlideUp 0.6s ease-out forwards;
        }

        .social-card:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.2);
        }

        @keyframes socialSlideUp {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .social-icon {
            font-size: 1.5rem;
        }

        /* Footer */
        footer {
            position: relative;
            z-index: 1;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .footer-left a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .footer-left a:hover { opacity: 0.8; }
        .footer-right {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Scroll reveal */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                top: 10px;
            }
            .publications-grid, .social-grid {
                grid-template-columns: 1fr;
            }
            .publications-container, .contact-container {
                padding: 20px;
            }
            footer {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-dots" id="bgDots"></div>

    <header>
        <a href="#" class="logo">
            <span>🌐</span>
            <span class="logo-blue">Dany.</span><span class="logo-white">run.place</span>
        </a>
        <nav id="nav">
            <div class="nav-indicator" id="navIndicator"></div>
            <a href="#" class="nav-link active" data-section="about">Главная</a>
            <a href="#publications" class="nav-link" data-section="publications">Публикации</a>
            <a href="#contact" class="nav-link" data-section="contact">Связь</a>        </nav>
    </header>

    <main>
        <!-- Главная / Начало -->
        <div id="about" class="reveal active-section">
            <h1>Добро пожаловать в<br>мое цифровое пространство</h1>
            <p class="subtitle">Я Dany — <span class="highlight">Дизайнер и Промпт-инженер</span></p>
            <p class="description" style="margin-left: 80px; margin-right: 80px;">
                Создаю качественный визуал для цифровых проектов. Направляю возможности нейросетей в русло чистого, функционального дизайна.
            </p>
        </div>

        <!-- Публикации -->
        <section id="publications">
            <h2 class="section-title reveal">Публикации</h2>
            <div class="publications-container reveal">
                <div class="publications-grid" id="publicationsGrid"></div>
            </div>
            <button class="show-more-btn reveal" id="showMoreBtn" onclick="togglePublications()">
                <span id="showMoreText">Показать ещё</span>
                <span id="hiddenCount">(0)</span>
            </button>
        </section>

        <!-- Связь -->
        <section id="contact">
            <h2 class="section-title reveal">Связь</h2>
            <div class="contact-container reveal">
                <div class="social-grid" id="socialGrid"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-left">Made by <a href="#" id="footerLink" target="_blank">Dany</a></div>
        <div class="footer-right">© Dany 2026</div>
    </footer>

    <script>
        const CONFIG = {
            publications: [
                { date: '04-05-2026 18:51', title: 'Первая публикация', excerpt: 'Здравствуйте всем! Это первая публикация на сайте, здесь будут новости и много чего интересного.' }
            ],
            socialLinks: [
                { icon: '✈️', name: 'Telegram Channel', url: 'https://t.me/TgThen' }
            ]
        };

        let showingAllPublications = false;
        const visibleLimit = 3;
        let currentActiveSection = 'about';

        // === BACKGROUND DOTS ===
        function createBgDots() {
            const container = document.getElementById('bgDots');
            for (let i = 0; i < 120; i++) {
                const dot = document.createElement('div');
                dot.className = 'bg-dot';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.animationDelay = Math.random() * 20 + 's';
                dot.style.animationDuration = (15 + Math.random() * 15) + 's';
                dot.style.opacity = 0.15 + Math.random() * 0.3;
                container.appendChild(dot);
            }
        }

        // === DATE FORMATTER ===
        function formatDate(dateString) {
            const [datePart, timePart] = dateString.split(' ');
            const [day, month, year] = datePart.split('-');
            const [hours, minutes] = timePart.split(':');
            const date = new Date(year, month - 1, day);
            const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
            return `${date.getDate()} ${months[date.getMonth()]} ${year} года в ${hours}:${minutes}`;
        }

        // === PUBLICATIONS RENDER ===
        function renderPublications() {
            const grid = document.getElementById('publicationsGrid');
            grid.innerHTML = '';
            const sorted = [...CONFIG.publications].sort((a, b) => {
                const parse = d => new Date(d.split(' ')[0].split('-').reverse().join('-'));
                return parse(b.date) - parse(a.date);
            });

            sorted.forEach((pub, i) => {
                const card = document.createElement('div');
                card.className = 'publication-card';
                card.style.animationDelay = `${i * 0.1}s`;
                if (i >= visibleLimit && !showingAllPublications) card.classList.add('hidden');
                card.innerHTML = `<div class="pub-title">${pub.title}</div><div class="pub-excerpt">${pub.excerpt}</div><div class="pub-date">${formatDate(pub.date)}</div>`;                grid.appendChild(card);
            });
            updateShowMoreButton();
            observeElements();
        }

        function updateShowMoreButton() {
            const btn = document.getElementById('showMoreBtn');
            const hidden = CONFIG.publications.length - visibleLimit;
            const countSpan = document.getElementById('hiddenCount');
            const textSpan = document.getElementById('showMoreText');
            
            if (hidden <= 0) { btn.style.display = 'none'; return; }
            btn.style.display = 'inline-flex';
            if (showingAllPublications) {
                textSpan.textContent = 'Скрыть';
                countSpan.style.display = 'none';
            } else {
                textSpan.textContent = 'Показать ещё';
                countSpan.textContent = `(${hidden})`;
                countSpan.style.display = 'inline';
            }
        }

        function togglePublications() {
            showingAllPublications = !showingAllPublications;
            renderPublications();
        }

        // === SOCIAL LINKS RENDER ===
        function renderSocialLinks() {
            const grid = document.getElementById('socialGrid');
            grid.innerHTML = '';
            CONFIG.socialLinks.forEach((link, i) => {
                const a = document.createElement('a');
                a.href = link.url;
                a.className = 'social-card';
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.style.animationDelay = `${i * 0.15}s`;
                a.innerHTML = `<span class="social-icon">${link.icon}</span><span>${link.name}</span>`;
                grid.appendChild(a);
            });
            observeElements();
        }

        // === SCROLL REVEAL OBSERVER ===
        function observeElements() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {                    if (e.isIntersecting) { e.target.classList.add('animate', 'active'); }
                    else { e.target.classList.remove('animate', 'active'); }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.reveal, .publication-card:not(.hidden), .social-card').forEach(el => obs.observe(el));
        }

        // === NAV INDICATOR LOGIC (STABLE) ===
        const sections = ['about', 'publications', 'contact'];
        const navLinks = document.querySelectorAll('.nav-link');
        const indicator = document.getElementById('navIndicator');
        const nav = document.getElementById('nav');

        function updateIndicator(sectionId) {
            const activeLink = document.querySelector(`.nav-link[data-section="${sectionId}"]`);
            if (!activeLink) return;

            navLinks.forEach(l => l.classList.remove('active'));
            activeLink.classList.add('active');

            const navRect = nav.getBoundingClientRect();
            const linkRect = activeLink.getBoundingClientRect();

            indicator.style.left = `${linkRect.left - navRect.left}px`;
            indicator.style.width = `${linkRect.width}px`;
        }

        function trackScroll() {
            const scrollPos = window.scrollY + window.innerHeight * 0.45;
            let current = 'about';

            for (let i = sections.length - 1; i >= 0; i--) {
                const sec = document.getElementById(sections[i]);
                if (sec && sec.offsetTop <= scrollPos) {
                    current = sections[i];
                    break;
                }
            }

            if (current !== currentActiveSection) {
                currentActiveSection = current;
                updateIndicator(current);
            }
        }

        // Init & Events
        window.addEventListener('scroll', trackScroll, { passive: true });
        window.addEventListener('resize', () => updateIndicator(currentActiveSection));
        navLinks.forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                const targetId = link.dataset.section;
                if (targetId === 'about') window.scrollTo({ top: 0, behavior: 'smooth' });
                else document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth' });
                
                updateIndicator(targetId);
            });
        });

        // Start
        function init() {
            createBgDots();
            renderPublications();
            renderSocialLinks();
            setTimeout(() => {
                updateIndicator('about');
                observeElements();
            }, 100);
        }

        init();
    </script>
</body>
</html>
